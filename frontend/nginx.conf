server {
    listen 80;

    # Use Docker's internal DNS for dynamic upstream resolution at request time.
    # This avoids the "host not found in upstream" crash when backend starts after Nginx.
    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Fallback to index.html supports React Router client-side routing
        try_files $uri $uri/ /index.html;
    }

    # Forward all /api/* requests to the Spring Boot backend container.
    # Using a named variable for proxy_pass forces Nginx to resolve "backend"
    # via the DNS resolver at runtime (each request), not at startup.
    location /api/ {
        set $upstream http://backend:8080;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
