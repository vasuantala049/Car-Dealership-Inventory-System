services:
  db:
    image: postgres:16
    container_name: dealership-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dealership
      POSTGRES_USER: dealership
      POSTGRES_PASSWORD: devpassword
    volumes:
      - db_data:/var/lib/postgresql/data
    # Healthcheck ensures other services wait until Postgres is actually ready to accept connections
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealership -d dealership"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: dealership-backend
    ports:
      - "8080:8080"
    environment:
      # These map directly to ${POSTGRES_HOST:...} placeholders in application.properties
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: dealership
      POSTGRES_USER: dealership
      POSTGRES_PASSWORD: devpassword
    # Don't start until the database healthcheck passes
    depends_on:
      db:
        condition: service_healthy
    # Healthcheck: wait until the Spring Boot API port is responding
    # Uses wget to hit the auth endpoint (always returns something, even 405/401)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/api/auth/login 2>&1 | grep -qv 'Connection refused' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    container_name: dealership-frontend
    ports:
      - "80:80"
    # Wait until the backend is healthy so Nginx can resolve the upstream at startup
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
